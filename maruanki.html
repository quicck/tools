<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丸暗記練習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .scroll-container {
            max-height: 180px;
            overflow-y: auto;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        textarea {
            width: 100%;
            min-height: 180px;
            padding: 12px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
        }

        .display-area {
            padding: 10px;
            font-size: 0.85rem;
            line-height: 1.6;
            word-break: break-all;
            white-space: pre-wrap;
        }

        /* Diff Colors */
        .match { color: #28a745; font-weight: 500; } /* 一致：緑 */
        .mismatch { color: #dc3545; font-weight: 500; text-decoration: underline; } /* 誤字：赤 */
        .missing { color: #adb5bd; background: #e9ecef; border-radius: 2px; margin: 0 1px; } /* 抜け：灰色 */

        .btn-primary {
            background: #007AFF;
            color: white;
            transition: all 0.2s;
        }
        .btn-primary:active { transform: scale(0.97); }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.05);
            color: #555;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 999px;
            transition: background 0.2s;
        }

        .step-hidden { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="glass w-full max-w-md p-6 space-y-5">
        <h1 class="text-xl font-bold text-gray-800 text-center">丸暗記練習</h1>

        <!-- Step 1 -->
        <div id="step1" class="fade-in space-y-3">
            <label class="text-sm font-semibold text-gray-600 block">1. 暗記する文を入力</label>
            <div class="scroll-container">
                <textarea id="originalInput" placeholder="ここに文章を入力..."></textarea>
            </div>
            <button onclick="toStep2()" class="btn-primary w-full py-3 rounded-xl font-bold">完了</button>
        </div>

        <!-- Step 2 -->
        <div id="step2" class="step-hidden fade-in space-y-3">
            <label class="text-sm font-semibold text-gray-600 block">2. 文を復元</label>
            <div class="scroll-container">
                <textarea id="recallInput" placeholder="思い出して入力..."></textarea>
            </div>
            <button onclick="toStep3()" class="btn-primary w-full py-3 rounded-xl font-bold">完了</button>
        </div>

        <!-- Step 3 -->
        <div id="step3" class="step-hidden fade-in space-y-4">
            <div>
                <label class="text-xs font-bold text-blue-600 block mb-1">正解</label>
                <div class="scroll-container"><div id="ansRef" class="display-area text-gray-600"></div></div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="text-xs font-bold text-gray-500">あなたの回答</label>
                    <button id="modeBtn" onclick="toggleMode()" class="btn-secondary">原文のまま表示</button>
                </div>
                <div class="scroll-container"><div id="ansRecall" class="display-area"></div></div>
            </div>

            <div class="flex justify-center pt-2">
                <button onclick="resetApp()" class="text-blue-500 text-sm font-medium">最初からやり直す</button>
            </div>
        </div>
    </div>

    <script>
        let originalText = "";
        let recallText = "";
        let isDiffMode = true;

        function toStep2() {
            originalText = document.getElementById('originalInput').value.trim();
            if(!originalText) return;
            document.getElementById('step1').classList.add('step-hidden');
            document.getElementById('step2').classList.remove('step-hidden');
            document.getElementById('recallInput').focus();
        }

        function toStep3() {
            recallText = document.getElementById('recallInput').value;
            document.getElementById('ansRef').textContent = originalText;
            renderComparison();
            document.getElementById('step2').classList.add('step-hidden');
            document.getElementById('step3').classList.remove('step-hidden');
        }

        function toggleMode() {
            isDiffMode = !isDiffMode;
            const btn = document.getElementById('modeBtn');
            btn.textContent = isDiffMode ? "原文のまま表示" : "比較モードに切替";
            renderComparison();
        }

        function renderComparison() {
            const container = document.getElementById('ansRecall');
            if (!isDiffMode) {
                container.textContent = recallText || "(未入力)";
                container.style.color = "inherit";
                return;
            }
            container.innerHTML = "";
            const diff = computeDiff(originalText, recallText);
            diff.forEach(part => {
                const span = document.createElement('span');
                span.textContent = part.value;
                if (part.type === 'match') span.className = 'match';
                else if (part.type === 'mismatch') span.className = 'mismatch';
                else if (part.type === 'missing') span.className = 'missing';
                container.appendChild(span);
            });
        }

        // シンプルな最長共通部分列アルゴリズムを用いた差分抽出
        function computeDiff(original, recall) {
            const s1 = Array.from(original);
            const s2 = Array.from(recall);
            const n = s1.length;
            const m = s2.length;
            const dp = Array.from({ length: n + 1 }, () => Array(m + 1).fill(0));

            for (let i = 1; i <= n; i++) {
                for (let j = 1; j <= m; j++) {
                    if (s1[i - 1] === s2[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
                    else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                }
            }

            const result = [];
            let i = n, j = m;
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && s1[i - 1] === s2[j - 1]) {
                    result.unshift({ type: 'match', value: s1[i - 1] });
                    i--; j--;
                } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                    result.unshift({ type: 'mismatch', value: s2[j - 1] });
                    j--;
                } else if (i > 0 && (j === 0 || dp[i][j - 1] < dp[i - 1][j])) {
                    result.unshift({ type: 'missing', value: s1[i - 1] });
                    i--;
                }
            }
            
            // 連続する同タイプの要素を結合
            const merged = [];
            if(result.length === 0) return [{type: 'none', value: '(未入力)'}];
            
            result.forEach(item => {
                if(merged.length > 0 && merged[merged.length-1].type === item.type) {
                    merged[merged.length-1].value += item.value;
                } else {
                    merged.push(item);
                }
            });
            return merged;
        }

        function resetApp() {
            document.getElementById('originalInput').value = "";
            document.getElementById('recallInput').value = "";
            document.getElementById('step3').classList.add('step-hidden');
            document.getElementById('step1').classList.remove('step-hidden');
            isDiffMode = true;
            document.getElementById('modeBtn').textContent = "原文のまま表示";
        }
    </script>
</body>
</html>
