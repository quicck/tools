<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Photo Transcoder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:active {
            transform: scale(0.96);
        }

        .drop-zone {
            border: 2px dashed rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .drop-zone.drag-over {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }

        .sortable-ghost {
            opacity: 0.2;
            transform: scale(0.9);
        }

        input[type="text"] {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.05);
            outline: none;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* スクロールバー非表示（iOS風） */
        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-4xl">
        <!-- Header -->
        <div class="glass rounded-[2rem] p-8 mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Image to ZIP</h1>
            <p class="text-gray-500 font-medium">画像のアップロード・並び替え・一括保存</p>
        </div>

        <!-- Settings Section -->
        <div class="glass rounded-[1.5rem] p-6 mb-6">
            <label for="zipFileName" class="block text-sm font-semibold text-gray-700 mb-2 ml-1">ZIPファイル名</label>
            <div class="flex items-center gap-3">
                <input type="text" id="zipFileName" placeholder="例: 旅行の写真 (未入力時は日付)" class="flex-grow px-5 py-3 rounded-2xl text-gray-800 placeholder-gray-400">
                <span class="text-gray-400 font-bold">.zip</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="glass rounded-[2rem] p-6 min-h-[500px] flex flex-col">
            
            <!-- Drop Zone -->
            <div id="dropZone" class="drop-zone rounded-3xl p-10 mb-8 flex flex-col items-center justify-center cursor-pointer hover:bg-white/30">
                <div class="bg-blue-500 text-white p-4 rounded-full shadow-lg shadow-blue-200 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
                    </svg>
                </div>
                <p class="text-gray-800 font-bold text-lg">画像を追加</p>
                <p class="text-gray-500 text-sm mt-1">ドラッグ＆ドロップでも追加できます</p>
                <input type="file" id="fileInput" class="hidden" multiple accept="image/*">
            </div>

            <!-- Grid Container -->
            <div id="imageGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-5">
                <!-- Items injected here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="flex-grow flex flex-col items-center justify-center text-gray-400 py-20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 opacity-20 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p class="font-medium">画像がありません</p>
            </div>

            <!-- Actions Footer -->
            <div id="actionArea" class="hidden mt-10 pt-8 border-t border-white/40 flex flex-col sm:flex-row gap-6 items-center justify-between">
                <div class="px-5 py-2 bg-black/5 rounded-full text-sm font-bold text-gray-700">
                    <span id="imageCount">0</span> 枚選択中
                </div>
                
                <div class="flex gap-4 w-full sm:w-auto">
                    <button id="clearBtn" class="flex-1 sm:flex-none px-6 py-3 rounded-2xl bg-red-50 text-red-500 font-bold hover:bg-red-100 transition-colors">
                        すべて削除
                    </button>
                    <button id="downloadBtn" class="flex-1 sm:flex-none px-10 py-3 rounded-2xl bg-blue-600 text-white font-bold shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                        <span>ZIPを書き出す</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toastArea" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 pointer-events-none"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const imageGrid = document.getElementById('imageGrid');
        const emptyState = document.getElementById('emptyState');
        const actionArea = document.getElementById('actionArea');
        const imageCountDisplay = document.getElementById('imageCount');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const zipNameInput = document.getElementById('zipFileName');

        let images = [];

        // Initialize Sorting
        const sortable = new Sortable(imageGrid, {
            animation: 250,
            ghostClass: 'sortable-ghost',
            onEnd: () => syncImagesArray()
        });

        const syncImagesArray = () => {
            const currentIds = Array.from(imageGrid.children).map(child => child.dataset.id);
            images = currentIds.map(id => images.find(img => img.id === id));
        };

        const handleFiles = (files) => {
            const fileList = Array.from(files).filter(f => f.type.startsWith('image/'));
            
            fileList.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const id = 'img_' + Math.random().toString(36).substr(2, 9);
                    const imgObj = { id, file, src: e.target.result, name: file.name };
                    images.push(imgObj);
                    createImageElement(imgObj);
                    updateUI();
                };
                reader.readAsDataURL(file);
            });
        };

        const updateUI = () => {
            const hasImages = images.length > 0;
            emptyState.classList.toggle('hidden', hasImages);
            actionArea.classList.toggle('hidden', !hasImages);
            imageCountDisplay.textContent = images.length;
        };

        const createImageElement = (imgObj) => {
            const container = document.createElement('div');
            container.className = 'glass-card relative group rounded-2xl overflow-hidden aspect-square cursor-grab active:cursor-grabbing';
            container.dataset.id = imgObj.id;
            container.innerHTML = `
                <img src="${imgObj.src}" class="w-full h-full object-cover pointer-events-none">
                <div class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <button class="delete-btn bg-white/20 backdrop-blur-md p-2 rounded-full text-white hover:bg-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
                <div class="absolute bottom-0 left-0 right-0 bg-white/30 backdrop-blur-md px-3 py-1.5 text-[11px] font-bold text-gray-900 truncate">
                    ${imgObj.name}
                </div>
            `;

            container.querySelector('.delete-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                images = images.filter(img => img.id !== imgObj.id);
                container.remove();
                updateUI();
            });

            imageGrid.appendChild(container);
        };

        // File Selection Events
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        clearBtn.addEventListener('click', () => {
            if(confirm('すべての画像をリストから削除しますか？')) {
                images = [];
                imageGrid.innerHTML = '';
                updateUI();
            }
        });

        // Date Format Helper
        const getTimestamp = () => {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            return `${y}${m}${d}`;
        };

        // Download Action
        downloadBtn.addEventListener('click', async () => {
            if (images.length === 0) return;

            const btnText = downloadBtn.querySelector('span');
            const originalText = btnText.textContent;
            
            btnText.textContent = '圧縮中...';
            downloadBtn.disabled = true;

            try {
                const zip = new JSZip();
                images.forEach(img => zip.file(img.name, img.file));

                const blob = await zip.generateAsync({ type: 'blob' });
                
                // Filename logic
                let fileName = zipNameInput.value.trim();
                if (!fileName) {
                    fileName = getTimestamp();
                }

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${fileName}.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showToast('保存が完了しました');
            } catch (err) {
                console.error(err);
                showToast('エラーが発生しました', true);
            } finally {
                btnText.textContent = originalText;
                downloadBtn.disabled = false;
            }
        });

        function showToast(msg, isErr = false) {
            const area = document.getElementById('toastArea');
            const toast = document.createElement('div');
            toast.className = `glass px-8 py-3 rounded-full mb-4 font-bold text-sm shadow-2xl transition-all duration-500 translate-y-10 opacity-0 ${isErr ? 'text-red-600' : 'text-blue-600'}`;
            toast.textContent = msg;
            area.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }
    </script>
</body>
</html>
