<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #ff2d55; 
            --item-active-bg: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #020617, #1e1b4b, #312e81);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            color: white;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 95vh;
        }

        .player-card {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .list-card {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            min-height: 300px;
        }

        .playlist-scroll {
            overflow-y: auto;
            flex: 1;
            padding-right: 4px;
        }

        .playlist-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .playlist-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .playlist-item {
            padding: 16px 20px;
            border-radius: 20px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid transparent;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateX(4px);
        }

        .playlist-item.active {
            background: var(--item-active-bg);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .playlist-item.active .song-title {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .item-icon-box {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.4);
        }

        .active .item-icon-box {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 45, 85, 0.3);
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,0.5);
        }

        .play-btn {
            background: white;
            color: black;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(255,255,255,0.1);
            transition: transform 0.1s;
        }
        .play-btn:active { transform: scale(0.92); }

        .artwork-main {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .playing .artwork-main { transform: scale(1.1); }

        .mode-active {
            color: var(--accent) !important;
            opacity: 1 !important;
        }

        .volume-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- プレーヤー部分 -->
        <div class="player-card" id="playerSection">
            <div class="flex justify-between items-center mb-6">
                <span class="text-xs font-bold opacity-40 uppercase tracking-widest">Now Playing</span>
                <label for="fileInput" class="cursor-pointer text-xs font-bold bg-white/10 hover:bg-white/20 py-2 px-4 rounded-full transition border border-white/5">
                    <i class="fas fa-plus mr-1"></i> 音楽を追加
                </label>
                <input type="file" id="fileInput" accept="audio/*" multiple class="hidden">
            </div>

            <div class="artwork-main">
                <i class="fas fa-music text-5xl opacity-20"></i>
            </div>
            
            <div class="text-center mb-6">
                <h2 id="currentTitle" class="text-2xl font-bold truncate px-2">曲を選択</h2>
                <p id="currentArtist" class="text-sm font-medium opacity-40 mt-1">Playlist is empty</p>
            </div>

            <div class="mb-6">
                <input type="range" id="progressBar" value="0" step="0.1" class="w-full mb-2">
                <div class="flex justify-between text-[11px] font-bold opacity-30">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>

            <div class="flex items-center justify-between px-2">
                <button class="btn-control w-10 h-10 opacity-30 hover:opacity-100" id="shuffleBtn">
                    <i class="fas fa-shuffle"></i>
                </button>
                <div class="flex items-center gap-8">
                    <button class="text-2xl opacity-80 hover:opacity-100" id="prevBtn">
                        <i class="fas fa-backward-step"></i>
                    </button>
                    <button class="play-btn" id="playPauseBtn">
                        <i class="fas fa-play ml-1" id="playIcon"></i>
                    </button>
                    <button class="text-2xl opacity-80 hover:opacity-100" id="nextBtn">
                        <i class="fas fa-forward-step"></i>
                    </button>
                </div>
                <button class="btn-control w-10 h-10 opacity-30 hover:opacity-100" id="repeatBtn">
                    <i class="fas fa-repeat"></i>
                </button>
            </div>

            <div class="volume-container flex items-center gap-4">
                <i class="fas fa-volume-low text-xs opacity-30"></i>
                <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="1" class="flex-1">
                <i class="fas fa-volume-high text-xs opacity-30"></i>
            </div>
        </div>

        <!-- プレイリスト部分 -->
        <div class="list-card">
            <h3 class="text-sm font-bold opacity-60 mb-4 px-2">プレイリスト</h3>
            <div class="playlist-scroll" id="playlist">
                <div class="text-center py-20 opacity-20 text-sm">
                    <i class="fas fa-file-audio text-3xl mb-3 block"></i>
                    ファイルを選択してください
                </div>
            </div>
        </div>
    </div>

    <audio id="mainAudio"></audio>

    <script>
        const audio = document.getElementById('mainAudio');
        const fileInput = document.getElementById('fileInput');
        const playlistEl = document.getElementById('playlist');
        const currentTitle = document.getElementById('currentTitle');
        const currentArtist = document.getElementById('currentArtist');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeBar = document.getElementById('volumeBar');
        const playerSection = document.getElementById('playerSection');
        
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let playlist = [];
        let currentIndex = -1;
        let isShuffle = false;
        let isRepeat = false;

        // 音量の初期設定をMAXに
        audio.volume = 1;
        volumeBar.value = 1;

        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const song = {
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    artist: "オーディオファイル",
                    url: URL.createObjectURL(file)
                };
                playlist.push(song);
            });
            renderPlaylist();
            if (currentIndex === -1 && playlist.length > 0) loadSong(0);
        };

        function renderPlaylist() {
            if (playlist.length === 0) return;
            playlistEl.innerHTML = '';
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="item-icon-box">
                        <i class="${index === currentIndex ? 'fas fa-volume-up' : 'fas fa-music'}"></i>
                    </div>
                    <div class="flex-1 truncate">
                        <div class="song-title text-base truncate transition-all">${song.title}</div>
                        <div class="text-xs opacity-40 font-medium truncate">${song.artist}</div>
                    </div>
                `;
                item.onclick = () => loadSong(index);
                playlistEl.appendChild(item);
                
                if (index === currentIndex) {
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });
        }

        function loadSong(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            const song = playlist[currentIndex];
            audio.src = song.url;
            currentTitle.innerText = song.title;
            currentArtist.innerText = song.artist;
            renderPlaylist();
            audio.play();
        }

        playPauseBtn.onclick = () => {
            if (currentIndex === -1) return;
            audio.paused ? audio.play() : audio.pause();
        };

        audio.onplay = () => {
            playIcon.className = 'fas fa-pause';
            playerSection.classList.add('playing');
        };

        audio.onpause = () => {
            playIcon.className = 'fas fa-play ml-1';
            playerSection.classList.remove('playing');
        };

        function nextSong() {
            if (playlist.length === 0) return;
            let nextIdx = isShuffle ? Math.floor(Math.random() * playlist.length) : (currentIndex + 1) % playlist.length;
            loadSong(nextIdx);
        }

        function prevSong() {
            if (playlist.length === 0) return;
            let prevIdx = (currentIndex - 1 + playlist.length) % playlist.length;
            loadSong(prevIdx);
        }

        nextBtn.onclick = nextSong;
        prevBtn.onclick = prevSong;

        audio.onended = () => isRepeat ? audio.play() : nextSong();

        audio.ontimeupdate = () => {
            if (isNaN(audio.duration)) return;
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = progress;
            currentTimeEl.innerText = formatTime(audio.currentTime);
            progressBar.style.background = `linear-gradient(to right, white ${progress}%, rgba(255,255,255,0.1) ${progress}%)`;
        };

        audio.onloadedmetadata = () => totalTimeEl.innerText = formatTime(audio.duration);

        progressBar.oninput = (e) => audio.currentTime = (e.target.value / 100) * audio.duration;
        volumeBar.oninput = (e) => audio.volume = e.target.value;

        shuffleBtn.onclick = () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('mode-active', isShuffle);
        };

        repeatBtn.onclick = () => {
            isRepeat = !isRepeat;
            repeatBtn.classList.toggle('mode-active', isRepeat);
        };

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        window.onkeydown = (e) => {
            if (e.code === "Space") { e.preventDefault(); playPauseBtn.click(); }
        };
    </script>
</body>
</html>
